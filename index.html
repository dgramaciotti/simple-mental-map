<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Mental Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <!-- Top toolbar -->
      <div id="toolbar">
        <span class="toolbar-brand">Simple Mental Map</span>
        <div class="toolbar-actions">
          <button id="file-menu">File</button>
        </div>
      </div>

      <!-- Left sidebar -->
      <div id="sidebar">
        <!-- 1. Maps Section -->
        <div id="map-list-container"></div>
        <div id="sidebar-detail" style="display:none;">
          <label class="sidebar-label">Label</label>
          <input type="text" id="node-label" class="sidebar-input" placeholder="Node text" />
          <div class="sidebar-meta">
            <label class="sidebar-label">ID</label>
            <span id="node-id" class="sidebar-id">—</span>
          </div>
          <div class="sidebar-meta">
            <label class="sidebar-label">Children</label>
            <span id="node-children-count" class="sidebar-id">0</span>
          </div>
          
          <div class="sidebar-action-group node-style-group">
            <div class="sidebar-label-row">
              <label class="sidebar-label">Node Font Size</label>
              <span id="node-font-size-val" class="sidebar-val-hint">inherit</span>
            </div>
            <input type="range" id="node-font-size-slider" min="8" max="48" step="1" value="16" class="sidebar-slider" />
          </div>

          <div class="sidebar-action-group node-style-group">
            <label class="sidebar-label">Node Text Color</label>
            <input type="color" id="node-text-color-picker" class="sidebar-color-picker" />
          </div>

          <div class="sidebar-action-group node-style-group">
            <label class="sidebar-label">Node Line Color</label>
            <input type="color" id="node-line-color-picker" class="sidebar-color-picker" />
          </div>

          <button id="reset-node-style" class="sidebar-btn tertiary">Reset Style</button>

          <hr class="sidebar-divider" />
          <button id="add-child" class="sidebar-btn primary">+ Add child</button>
          <button id="delete-node" class="sidebar-btn danger">Delete</button>
        </div>

        <hr class="sidebar-divider" />
        
        <div id="sidebar-empty"></div>
        <!-- 4. Custom Design (Bottom & Collapsed) -->
        <div id="design-container" class="collapsed">
          <div class="sidebar-section-header design-header">
            <span>Custom Design</span>
            <span class="design-toggle">▼</span>
          </div>
          <div class="design-body">
            <div class="sidebar-action-group">
              <label class="sidebar-label">Theme</label>
              <select id="theme-select" class="sidebar-input">
                <option value="classic">Classic Dark</option>
                <option value="cyberpunk">Cyberpunk Neon</option>
                <option value="clean">Clean</option>
                <option value="forest">Forest Calm</option>
              </select>
            </div>

            <div class="sidebar-action-group">
              <div class="sidebar-label-row">
                <label class="sidebar-label">Base Font Size</label>
                <span id="font-size-val" class="sidebar-val-hint">13px</span>
              </div>
              <input type="range" id="font-size-slider" min="10" max="24" step="1" value="13" class="sidebar-slider" />
            </div>

            <div class="sidebar-action-group">
              <div class="sidebar-label-row">
                <label class="sidebar-label">Branch Thickness</label>
                <span id="branch-width-val" class="sidebar-val-hint">1.5px</span>
              </div>
              <input type="range" id="branch-width-slider" min="0.5" max="5" step="0.5" value="1.5" class="sidebar-slider" />
            </div>

            <div class="sidebar-action-group">
              <div class="sidebar-label-row">
                <label class="sidebar-label">Spacing</label>
                <span id="spacing-val" class="sidebar-val-hint">80</span>
              </div>
              <input type="range" id="spacing-slider" min="40" max="150" step="10" value="80" class="sidebar-slider" />
            </div>
          </div>
        </div>
      </div>

      <!-- Floating map actions -->
      <div id="map-actions-floating">
        <button id="reset-view-btn" title="Reset View (Fit Map)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <div class="palette-item floating-item" draggable="true" id="new-node-template" title="Drag to map to add node">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </div>
      </div>

      <svg id="mindmap"></svg>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <!-- Hidden file input for Import -->
    <input type="file" id="import-file-input" style="display: none;" accept=".md,.txt" />
  </body>
</html>
